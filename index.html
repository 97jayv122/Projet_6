<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <!-- Important pour la responsivité -->
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JustStreamIt</title>
  <!-- Inclusion de Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <style>
    /* Forcer la largeur des images pour qu'elles s'adaptent au conteneur */
    #modal-movie-img {
      max-height: 400px;
      width: 25%;
      object-fit: cover;
    }
    /* Styles pour les vignettes de films et leur overlay */
    .film-thumbnail {
      position: relative;
      margin-bottom: 15px;
    }
    .film-thumbnail .overlay {
      max-width: 270px;
      position: absolute;
      bottom: 35px;
      left: 55px;
      width: 100%;
      background: rgba(0, 0, 0, 0.5); /* fond semi-transparent */
      color: #fff;
      text-align: center;
      font-size: large;
      padding: 5px;
      /* justify-items: center; */
    }
  </style>
</head>
<body>
  <!-- En-tête -->
  <header class="container text-center my-4 bg-secondary">
    <div class="row">
      <img class="w-25" src=https://user.oc-static.com/upload/2020/09/18/16004298163529_P5.png alt="logo JustStreamIt" id="logo">
      <h1 class=""><strong>JustStreamIt</strong></h1>      
    </div>

  </header>

  <!-- Section "Meilleur film" -->
  <section class="container">
    <h2 class="mx-5 my-4"><strong>Meilleur film</strong></h2>
    <div class="card border-4 border-dark mx-auto d-block" style="max-width: 1030px;">
        <div class="row g-0">
            <div class="col-md-4">
              <img id="best-movie-img" src="" class="img-fluid rounded-start w-75" alt="Meilleur film" data-movie-id="">
            </div>
            <div class="col-md-8">
                <div class="card-body">
                    <h1 id="best-movie-title" class="card-title"><strong>titre du film</strong></h1>
                    <p id="best-movie-summary" class="card-text">Résumé du film...</p>
                    <div class="gap-2 d-md-flex justify-content-md-end">
                        <button class="btn btn-danger btn-lg" id="detail" data-bs-toggle="modal" data-bs-target="#filmModal">Détails</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
  </section>

    <!-- Section "Action" -->
    <section class="container mb-5">
      <h2 class="mx-5 my-4"><strong>Action</strong></h2>
      <div class="row" id="action-films">
        <!-- Les films seront injectés ici dynamiquement -->
      </div>
      <button class="btn btn-secondary d-lg-none">Voir plus</button>
    </section>

  <!-- Section "Aventure" -->
  <section class="container mb-5">
    <h2 class="mx-5 my-4"><strong>Drama</strong></h2>
    <div class="row" id="drama-films">
      <!-- Les films seront injectés ici dynamiquement -->
    </div>
    <button class="btn btn-secondary d-lg-none">Voir plus</button>
  </section>

  <!-- Section "Family" -->
  <section class="container mb-5">
    <h2 class="mx-5 my-4"><strong>Family</strong></h2>
    <div class="row" id="family-films">
      <!-- Les films seront injectés ici dynamiquement -->
    </div>
    <button class="btn btn-secondary d-lg-none">Voir plus</button>
  </section>

  <!-- Section "Autres " -->
  <section class="container mb-5">
    <h2 class="d-inline ms-5 my-4"><strong>Autres : </strong></h2>
    <select class="custom-select mb-3" id="selectCategory">
      <option selected value="">Choisir une catégorie...</option>
      <!-- Les options seront ajoutées dynamiquement -->
    </select>
    <div class="row" id="selected-category-films">
      <!-- Les films du genre sélectionné seront affichés ici -->
    </div>
  </section>

  <!-- Fenêtre modale pour afficher les détails d'un film -->
  <div class="modal fade" id="filmModal" tabindex="-1" role="dialog" aria-labelledby="filmModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg" role="document">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="filmModalLabel">Détails du film</h5>
          <button type="button" class="close" data-bs-dismiss="modal" aria-label="Fermer">
            <span aria-hidden="true">&times;</span>
          </button>
        </div>
        <div class="modal-body">
          <img id="modal-movie-img" src="" alt="Film Detail" class="modal-img img-fluid mb-3">
          <div id="filmModalBody">
            <!-- Détails du film affichés dynamiquement -->
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-danger" data-bs-dismiss="modal">Fermer</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Inclusion des scripts nécessaires à Bootstrap-->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <!-- Inclusion du fichier JavaScript externe -->
  <script src="script.js"></script>
</body>
</html>
